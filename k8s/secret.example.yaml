apiVersion: v1
kind: Secret
metadata:
  name: gobig-api-secrets
  namespace: gobig
type: Opaque
stringData:
  REDIS_URL: "redis://:password@redis-host:6379/0"
  DATABASE_URL: "postgresql://user:password@postgres-host:5432/dbname"
  STRIPE_WEBHOOK_SECRET: "whsec_replace_me"
  SENTRY_WEBHOOK_SECRET: "replace_me"
  SLACK_PLATFORM_HEALTH_WEBHOOK_URL: "https://hooks.slack.com/services/replace/me"
  GOBIG_CF_API_TOKEN: "replace_me"
  GOBIG_CF_ACCOUNT_ID: "replace_me"
  GOBIG_CF_KV_NAMESPACE_ID: "replace_me"
  GOBIG_PLAYBOOK_APPROVAL_TOKEN: "replace_me"
---
apiVersion: v1
kind: Secret
metadata:
  name: gobig-iam-public-key
  namespace: gobig
type: Opaque
stringData:
  iam_public_key.pem: |
    -----BEGIN PUBLIC KEY-----
    REPLACE_WITH_REAL_PUBLIC_KEY
    -----END PUBLIC KEY-----
