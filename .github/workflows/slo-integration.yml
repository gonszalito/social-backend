name: SLO Integration

on:
  pull_request:
  push:
    branches:
      - feature/all

jobs:
  slo-integration:
    name: slo-integration
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run SLO integration and functional guard tests
        run: |
          pytest -q tests/test_slo_functional_guards.py tests/test_slo_integration.py
